steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/dashboard:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/dashboard:latest'
      - '.'

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/dashboard'

  # Step 3: Update env-repo with new image tag
  - name: 'gcr.io/cloud-builders/git'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Clone with token
        git clone https://$$GITHUB_TOKEN@github.com/${_ENV_REPO_OWNER}/${_ENV_REPO_NAME}.git env-config
        cd env-config
        sed -i "s|image:.*dashboard.*|image: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/dashboard:${SHORT_SHA}|" manifests/deployment.yaml
        git config user.name "Cloud Build"
        git config user.email "cloudbuild@${PROJECT_ID}.iam.gserviceaccount.com"
        git add manifests/deployment.yaml
        git commit -m "Update dashboard image to ${SHORT_SHA}"
        git push origin master
    secretEnv: ['GITHUB_TOKEN']

# Default substitutions
substitutions:
  _REGION: 'us-central1'
  _REPO: 'docker-images'
  _ENV_REPO_OWNER: 'dev-Danialw'
  _ENV_REPO_NAME: 'gitops-dashboard-env'

# Secrets (GitHub token for pushing to env-repo)
availableSecrets:
  secretManager:
    - versionName: projects/gitops-dashboard-1777657343/secrets/github-token/versions/latest
      env: 'GITHUB_TOKEN'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Images produced
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/dashboard:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/dashboard:latest'