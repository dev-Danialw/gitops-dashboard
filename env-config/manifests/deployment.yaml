apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  labels:
    app: dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: us-central1-docker.pkg.dev/gitops-dashboard-1777657343/docker-images/dashboard:latest
        ports:
        - containerPort: 8080
        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /var/secrets/key.json
        - name: GOOGLE_CLOUD_PROJECT
          value: "gitops-dashboard-1777657343"
        - name: GKE_CLUSTER
          value: "dashboard-cluster"
        - name: GKE_LOCATION
          value: "us-central1-a"
        volumeMounts:
        - name: gcp-sa
          mountPath: /var/secrets
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: gcp-sa
        secret:
          secretName: gcp-sa-key